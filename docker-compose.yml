services:
  postgres:
    image: postgres:15-alpine
    container_name: trendora-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - trendora-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ${DOCKERHUB_USERNAME}/trendora-backend:latest
    restart: always
    env_file:
      - .env
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3001
      DOCKER_PAT: ${DOCKER_PAT}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trendora-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile-production
      args:
        VITE_API_URL: /api
    image: ${DOCKERHUB_USERNAME}/trendora-frontend:latest
    container_name: trendora-frontend-prod
    restart: always
    expose:
      - "80"
    environment:
      DOCKER_PAT: ${DOCKER_PAT}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trendora-network

  nginx-proxy:
    image: nginx:alpine
    container_name: trendora-nginx-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - trendora-network

volumes:
  postgres_data:

networks:
  trendora-network:
    driver: bridge

