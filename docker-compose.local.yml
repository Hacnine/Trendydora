services:
  postgres:
    image: postgres:15-alpine
    container_name: trendora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trendora
    ports:
      - '5434:5432'
    volumes:
      - trendora_pgdata:/var/lib/postgresql/data

volumes:
  trendora_pgdata:
