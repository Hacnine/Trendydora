# Nginx reverse proxy for Trendora production
# Routes /api/* → backend, everything else → frontend
#
# HTTPS: Uncomment the SSL server block below and configure your domain.
# Obtain a certificate first: sudo certbot certonly --standalone -d yourdomain.com

upstream backend {
    server backend:3001;
}

server {
    listen 80;
    server_name _;

    # Increase body size limit for file uploads
    client_max_body_size 20M;

    # Proxy API requests to NestJS backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy all other requests to React frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

